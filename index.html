<!DOCTYPE html>
<html>
<head>
    <title>Q3 Skills Test</title>
    <style>
        body {
            margin: 0;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background-image: url("bg.jpg");
            background-size: cover;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #FFC0CB;
            border-bottom: 3px solid #f7dfe3;
        }

        .header-logo img {
            height: 65px;
            border: 1px solid #ffb5c2;
            border-radius: 100px;
            box-shadow: 0 5px 10px #00000080;
        }

        nav {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .nav-left {
            display: flex;
            flex-grow: 1;
            margin-left: 20px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            margin-left: 30px;
            font-size: 25px;
            transition: color 0.3s;
            text-shadow: 0 1.5px 2px #000;
            white-space: nowrap;
        }

        nav a:hover {
            color: #000;
            text-shadow: none;
        }

        .container {
            width: 85%;
            margin: 50px auto;
            background: rgba(255, 192, 203, 0.6);
            padding: 50px;
            border-radius: 15px;
            border: 2px solid #000000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }

        h2 {
            font-weight: 700;
            font-size: 65px;
            text-align: center;
            color: #fff;
            text-shadow: 0 1.5px 2px #000;
            margin-bottom: 0;
        }

        p {
            font-weight: 500;
            font-size: 30px;
            text-align: center;
            color: #fff;
            text-shadow: 0 1.5px 2px #000;
            margin-top: 15px;
        }

        .form-area {
            display: flex;
            justify-content: center;
            align-items: stretch; 
            margin-top: 40px;
            gap: 50px;
        }

        .profile-thing {
            width: 35%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .profile-pic {
            width: 280px; 
            height: 280px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #ffa1ba;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 10px rgba(0,0,0,0.5);
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #placeholder {
            position: absolute;
            color: #777;
            font-size: 20px;
            font-weight: bold;
        }

        #pfp {
            display: none;
        }

        .upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 25px;
            width: 100%;
        }

         .custom-pic, .upload-btn {
            display: block;
            width: 220px;
            padding: 12px 15px; 
            margin: 8px 0;
            background: #FFC0CB;
            border: 2px solid #000;
            border-radius: 30px;
            color: #ffffff;
            text-shadow: 0 1.5px 2px #000;
            cursor: pointer;
            font-family: inherit;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            transition: 0.2s;
            box-sizing: border-box; 
        }

        .upload-btn:hover, .custom-pic:hover {
            transform: scale(1.05);
            text-shadow: none;
            color: #000;
        }

        .form-box {
            width: 55%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 100%;
        }

        .form-box label {
            display: block;
            font-weight: bold;
            font-size: 25px;
            margin-top: 15px;
            color: #fff;
            text-shadow: 0.5px 1px 1.5px #000;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 5px 0 10px 0;
            border-radius: 15px;
            border: 2px solid #ffa1ba;
            box-sizing: border-box;
            font-size: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-row input {
            width: 20px;
            height: 20px;
            margin: 0;
        }

        .checkbox-row label {
            display: inline;
            font-size: 18px;
            margin: 0;
        }

        label[for="terms"]:hover {
            text-shadow: 1px 1.5px 2px #000;
            color: #f7dfe3;
        }

        #terms:checked + label {
             color: #f7dfe3;
             text-shadow: 1px 1.5px 2px #000;
             text-decoration: underline;
        }

        .button-row {
            width: 100%;
            text-align: center;
            margin-top: 50px;
        }

        .action-btn {
            width: 250px;
            padding: 15px;
            margin: 0 20px;
            background: #FFC0CB;
            border: 2px solid #000;
            border-radius: 30px;
            color: #ffffff;
            text-shadow: 0 1.5px 2px #000;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            transition: 0.3s;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        .action-btn:hover {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transform: scale(1.05);
            color: #000;
            text-shadow: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo">
            <img src="logo.jpg" alt="logo">
        </div>
        <nav>
            <div class="nav-left">
                <a href="https://www.metrolinemap.com/metro/manila/">Home</a>
                <a href="https://lrmc.ph/our-business-featured/fare-matrix/">Fare Matrix</a>
                <a href="https://www.lrta.gov.ph/train-operating-schedule/">Schedule</a>
                <a href="https://lrmc.ph/contact-us/">Help</a>
            </div>
            <div class="nav-right">
                <a href="https://www.lrta.gov.ph/tickets-and-fares/">Book Now</a>
                <a href="index.html">Create Account</a>
            </div>
        </nav>
    </header>

    <div class="container">
        <h2>ACCOUNT REGISTRATION</h2>
        <p>Kindly fill out the whole form to create an account.</p>

        <div class="form-area">
            <div class="profile-thing">
                <div class="profile-pic">
                    <span id="placeholder">Upload Profile</span>
                    <img src="" id="preview">
                </div>
                <div class="upload">
                    <input type="file" id="pfp" accept="image/*">
                    <label for="pfp" class="custom-pic">Choose File</label>
                    <button type="button" class="upload-btn">Upload Photo</button>
                </div>
            </div>

            <div class="form-box">
                <div>
                    <label for="first">First Name:</label>
                    <input type="text" id="first" placeholder="Enter your First Name">

                    <label for="last">Last Name:</label>
                    <input type="text" id="last" placeholder="Enter your Last Name">

                    <label for="contact">Contact Number:</label>
                    <input type="tel" id="contact" placeholder="Enter your Contact Number" required>

                    <label for="email">Email Address:</label>
                    <input type="email" id="email" placeholder="Enter your Email Address" required>

                    <label for="user">Username:</label>
                    <input type="text" id="user" placeholder="Enter your Username">

                    <label for="pwd">Password:</label>
                    <input type="password" id="pwd" placeholder="Enter your Password">
                </div>

                <div class="checkbox-row">
                    <input type="checkbox" id="terms">
                    <label for="terms">I accept the Terms of Use and Privacy Policy</label>
                </div>
            </div>
        </div>

        <div class="button-row">
            <button class="action-btn" onclick="register()">Create Account</button>
            <button class="action-btn" type="reset" onclick="window.location.reload()">Cancel</button>
        </div>
    </div>

    <script>
        function register() {
            let email = document.getElementById("email").value;
            let contact = document.getElementById("contact").value;
            let terms = document.getElementById("terms").checked;

            if (email == "" || contact == "") {
                alert("Kindly complete the form.");
                return;
            }

            if (!terms) {
                alert("You must accept the Terms of Use to continue.");
                return;
            }

            alert("Account created!");
            alert("Registration successful! :)");
        }

        document.getElementById("pfp").onchange = function(event) {
            let reader = new FileReader();
            reader.onload = function() {
                document.getElementById("preview").src = reader.result;
                document.getElementById("placeholder").style.display = "none";
            }
            if (event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }

        document.querySelectorAll('.form-box input').forEach(input => {
        input.addEventListener('input', function() {
            let label = this.previousElementSibling;
            if (this.value.length > 0) {
                label.style.color = "black";
                label.style.textShadow = "none";
            } else {
                label.style.color = "white";
                label.style.textShadow = "0.5px 1px 1.5px #000";
            }
            });
        });

    </script>
</body>
</html>
